name: BotWa

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          check-latest: true
          cache: 'npm'
      - name: cek versi nodejs
        run: node -v
      - name: Run TestCafe
        uses: actions/checkout@v1
      - uses: DevExpress/testcafe-action@latest
        with:
          run: 'chrome tests'
